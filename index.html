<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SmartTube - متصفح العائلة الآمن</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* تصميم يحاكي تطبيقات التلفاز (نتفليكس / يوتيوب تي في) */
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --accent-color: #ff0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* منع تحديد النصوص في الشاشات اللمسية */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            /* منع السحب والتمرير المزعج على الآيباد */
            -webkit-overflow-scrolling: touch; 
        }

        header {
            padding: 30px 40px;
            background: linear-gradient(to bottom, rgba(15,15,15,1) 0%, rgba(15,15,15,0) 100%);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 span {
            color: var(--accent-color);
        }

        .channel-title {
            padding: 0 40px;
            font-size: 1.5rem;
            color: #aaaaaa;
            margin-bottom: 20px;
        }

        /* شبكة الفيديوهات (Grid) */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 0 40px 60px 40px;
        }

        .video-card {
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s ease;
            position: relative;
        }

        /* تأثير التكبير عند تمرير الماوس أو الريموت */
        .video-card:hover, .video-card:focus {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
            z-index: 2;
            outline: none; /* إخفاء إطار التركيز الافتراضي */
            border: 3px solid var(--accent-color);
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-size: cover;
            background-position: center;
            background-color: #333; /* لون افتراضي قبل تحميل الصورة */
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.4;
            /* قص النص الطويل (3 أسطر كحد أقصى) */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* مشغل الفيديو المنبثق (Fullscreen Player) */
        #player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        #player-container {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        #close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,0,0,0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            font-weight: bold;
        }

        #close-btn:hover {
            background: red;
            transform: scale(1.1);
        }

        /* لضمان تناسب الشاشات المختلفة */
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                padding: 0 20px 40px 20px;
            }
            header {
                padding: 20px;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1 id="main-title"><span>▶</span> SmartTube</h1>
        <button id="back-btn" onclick="showChannelsView()" style="display:none; padding: 10px 20px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 1.1rem; font-weight: bold; margin-top: 15px;">🔙 العودة للقنوات</button>
    </header>

    <div class="channel-title" id="status-title">اختر القناة للمشاهدة</div>

    <!-- شبكة القنوات -->
    <div class="video-grid" id="channels-grid">
        <!-- سيتم توليد كروت القنوات من الجافاسكريبت -->
    </div>

    <!-- شبكة الفيديوهات -->
    <div class="video-grid" id="videos-grid" style="display:none;">
        <!-- سيتم توليد الفيديوهات هنا -->
    </div>

    <!-- شاشة تشغيل الفيديو -->
    <div id="player-overlay">
        <button id="close-btn" onclick="closePlayer()">✕</button>
        <div id="player-container"></div>
    </div>

    <!-- شاشة عرض تيليجرام -->
    <div id="telegram-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#17212b; z-index:100; flex-direction:column;">
        <button onclick="closeTelegram()" style="position:absolute; top:20px; right:20px; background:rgba(0,136,204,0.9); color:white; border:none; border-radius:50%; width:55px; height:55px; font-size:1.5rem; cursor:pointer; z-index:101; font-weight:bold;">✕</button>
        <iframe id="telegram-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <!-- استدعاء مكتبة يوتيوب -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // 💡💡 قائمة القنوات المسموحة - أضف أو احذف هنا 💡💡
        const channels = [
            { type: 'youtube', id: 'UCx9R02FLwmLOIr0ViM_M2Bw', name: 'عائلة مشيع' },
            { type: 'youtube', id: 'UCiZL26ScfRZDdEAkkPJgJbA', name: 'عمر وهنا - عربي' },
            { type: 'youtube', id: 'UCu7WS26vJdvMwHajtXoijSQ', name: 'بليبي بالعربي' },
            { type: 'youtube', id: 'UChOQ_YphUJTEczNXMrUoucg', name: 'تام تام' },
            { type: 'youtube', id: 'UCoxoYSL3rFXB7JSELiI5V1w', name: 'فلاد ونيكي عربي' },
            { type: 'youtube', id: 'UCWIdqSQekeGmUWlSFeCiEnA', name: 'أسرتنا' },
            { type: 'youtube', id: 'UCO_NkEoZ0oJh19HJOVe72Sg', name: 'سبيستون' },
            { type: 'telegram', id: 'Basem4aflamcartoooon', name: 'افلام ديزني بالعربي' }
        ];
        
        let currentVideos = [];
        let player = null;
        // تخزين مؤقت لصور القنوات
        const channelAvatars = {};

        const channelsGrid = document.getElementById('channels-grid');
        const videosGrid = document.getElementById('videos-grid');
        const statusTitle = document.getElementById('status-title');
        const backBtn = document.getElementById('back-btn');

        // 1. جلب صورة القناة من أول فيديو لها ثم رسم الكرت
        async function loadChannelAvatar(channel) {
            if (channel.type === 'telegram') {
                return '🎬'; // تيليجرام يستخدم إيموجي
            }
            try {
                const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channel.id}`;
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
                const data = await fetch(apiUrl).then(r => r.json());
                if (data.status === 'ok' && data.items && data.items[0]) {
                    // نأخذ صورة مصغرة من أول فيديو بجودة عالية
                    const firstVideoId = data.items[0].guid.split('yt:video:')[1];
                    return `https://img.youtube.com/vi/${firstVideoId}/mqdefault.jpg`;
                }
            } catch(e) {}
            return null;
        }

        async function renderChannels() {
            channelsGrid.innerHTML = '<div style="color:#aaa; padding:40px; font-size:1.2rem;">جاري تحميل القنوات...</div>';
            
            // جلب صور كل القنوات معاً بشكل متوازٍ
            const avatarPromises = channels.map(ch => loadChannelAvatar(ch));
            const avatars = await Promise.all(avatarPromises);

            let html = '';
            channels.forEach((channel, i) => {
                const avatar = avatars[i];
                const action = channel.type === 'telegram'
                    ? `openTelegram('${channel.id}', '${channel.name}')`
                    : `openChannel('${channel.id}', '${channel.name}')`;
                const badge = channel.type === 'telegram'
                    ? '<span style="font-size:0.75rem;background:rgba(0,136,204,0.8);padding:3px 10px;border-radius:20px;color:white;">تيليجرام</span>'
                    : '<span style="font-size:0.75rem;background:rgba(255,0,0,0.7);padding:3px 10px;border-radius:20px;color:white;">يوتيوب</span>';

                const bgStyle = avatar && typeof avatar === 'string' && avatar.startsWith('http')
                    ? `background-image: url('${avatar}'); background-size: cover; background-position: center;`
                    : `background: linear-gradient(135deg, #333, #555);`;

                html += `
                    <div class="video-card" tabindex="0" onclick="${action}" style="position:relative; overflow:hidden; height:200px;">
                        <div style="position:absolute;inset:0; ${bgStyle}"></div>
                        <div style="position:absolute;inset:0; background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);"></div>
                        <div style="position:absolute;bottom:0;left:0;right:0;padding:15px;display:flex;flex-direction:column;align-items:center;gap:6px;">
                            <h2 style="color:white;font-size:1.3rem;font-weight:800;text-shadow:0 2px 4px rgba(0,0,0,0.8);text-align:center;">${channel.name}</h2>
                            ${badge}
                        </div>
                    </div>
                `;
            });
            channelsGrid.innerHTML = html;
        }

        // فتح قناة تيليجرام في تبويب جديد
        function openTelegram(channelId, channelName) {
            window.open(`https://t.me/s/${channelId}`, '_blank');
        }

        function closeTelegram() {
            const overlay = document.getElementById('telegram-overlay');
            const frame = document.getElementById('telegram-frame');
            overlay.style.display = 'none';
            frame.src = '';
        }

        // 2. الدخول للقناة وسحب فيديوهاتها
        async function openChannel(channelId, channelName) {
            channelsGrid.style.display = 'none';
            videosGrid.style.display = 'grid';
            backBtn.style.display = 'block';
            statusTitle.innerText = `جاري الاتصال بقناة ${channelName}...`;
            videosGrid.innerHTML = '';

            const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    currentVideos = data.items.map(item => {
                        let videoId = "";
                        if (item.guid && item.guid.includes('yt:video:')) {
                            videoId = item.guid.split('yt:video:')[1];
                        } else {
                            const linkStr = item.link || "";
                            if (linkStr.includes('v=')) videoId = linkStr.split('v=')[1];
                            const amp = videoId.indexOf('&');
                            if (amp !== -1) videoId = videoId.substring(0, amp);
                        }
                        return { id: videoId, title: item.title };
                    });
                    
                    statusTitle.innerText = `قناة: ${channelName}`;
                    renderVideos();
                } else {
                    statusTitle.innerText = `عذراً، حدث خطأ أثناء الاتصال بالقناة.`;
                }
            } catch (error) {
                console.error('Error:', error);
                statusTitle.innerText = `تأكد من اتصالك بالإنترنت.`;
            }
        }

        // 3. عرض فيديوهات القناة المختارة
        function renderVideos() {
            let html = '';
            currentVideos.forEach(video => {
                const thumbUrl = `https://img.youtube.com/vi/${video.id}/hqdefault.jpg`;
                html += `
                    <div class="video-card" tabindex="0" onclick="openPlayer('${video.id}')">
                        <div class="thumbnail" style="background-image: url('${thumbUrl}');"></div>
                        <div class="video-info">
                            <div class="video-title">${video.title}</div>
                        </div>
                    </div>
                `;
            });
            videosGrid.innerHTML = html;
        }

        // 4. زر العودة
        function showChannelsView() {
            videosGrid.style.display = 'none';
            backBtn.style.display = 'none';
            channelsGrid.style.display = 'grid';
            statusTitle.innerText = 'اختر القناة للمشاهدة';
        }

        // 5. المشغل
        function openPlayer(videoId) {
            const overlay = document.getElementById('player-overlay');
            overlay.style.display = 'flex';

            if (player) {
                player.loadVideoById(videoId);
            } else {
                player = new YT.Player('player-container', {
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1,      
                        'rel': 0,           
                        'modestbranding': 1,
                        'fs': 1,            
                        'controls': 1       
                    },
                    events: {
                        'onStateChange': function(event) {
                            if (event.data === YT.PlayerState.ENDED) {
                                closePlayer();
                            }
                        }
                    }
                });
            }
        }

        // 5. إغلاق المشغل
        function closePlayer() {
            const overlay = document.getElementById('player-overlay');
            overlay.style.display = 'none';
            if (player) {
                player.stopVideo(); // إيقاف الفيديو عند الإغلاق
            }
        }

        // بدء الرسم فور تحميل الصفحة
        renderChannels();

    </script>
</body>
</html>
