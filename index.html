<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <title>SmartTube - متصفح العائلة الآمن</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #e74c3c;
            --text: #ffffff;
            --sub: #aaaaaa;
            --radius: 14px;
            --transition: 0.2s ease;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 40px 16px;
            background: linear-gradient(to bottom, rgba(15,15,15,1) 0%, rgba(15,15,15,0) 100%);
            position: sticky;
            top: 0;
            z-index: 10;
            gap: 16px;
            flex-wrap: wrap;
        }
        h1 { font-size: 2.2rem; font-weight: 800; display: flex; align-items: center; gap: 12px; }
        h1 span { color: var(--accent); }

        #back-btn {
            display: none;
            padding: 10px 22px;
            background: #2a2a2a;
            color: var(--text);
            border: 2px solid #444;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            transition: var(--transition);
        }
        #back-btn:hover, #back-btn:focus {
            background: var(--accent);
            border-color: var(--accent);
            outline: none;
        }

        #reset-btn {
            padding: 8px 18px;
            background: transparent;
            color: var(--sub);
            border: 1px solid #444;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: var(--transition);
        }
        #reset-btn:hover { color: var(--accent); border-color: var(--accent); }

        /* ===== STATUS BAR ===== */
        #status-title {
            padding: 4px 40px 16px;
            font-size: 1.3rem;
            color: var(--sub);
        }

        /* ===== GRIDS ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 40px 60px;
        }

        /* ===== CHANNEL CARDS ===== */
        .ch-card {
            position: relative;
            height: 190px;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            outline: 3px solid transparent;
            transition: transform var(--transition), outline-color var(--transition), box-shadow var(--transition);
            will-change: transform;
            background: var(--card);
        }
        .ch-card:hover, .ch-card:focus {
            transform: scale(1.04);
            outline-color: var(--accent);
            box-shadow: 0 8px 30px rgba(231,76,60,0.3);
        }
        .ch-card .bg {
            position: absolute; inset: 0;
            background-size: cover;
            background-position: center;
            transition: transform 0.4s ease;
        }
        .ch-card:hover .bg { transform: scale(1.06); }
        .ch-card .overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.1) 65%, transparent 100%);
        }
        .ch-card .info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 14px 16px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .ch-card h2 {
            font-size: 1.2rem; font-weight: 800;
            text-shadow: 0 2px 8px rgba(0,0,0,1);
            text-align: center; color: white;
        }
        .badge {
            font-size: 0.7rem;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 700;
            color: white;
        }
        .badge-yt   { background: rgba(231,76,60,0.85); }
        .badge-tg   { background: rgba(0,136,204,0.85); }
        .badge-gd   { background: rgba(66,133,244,0.85); }

        /* ===== VIDEO CARDS ===== */
        .vid-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            outline: 3px solid transparent;
            transition: transform var(--transition), outline-color var(--transition), box-shadow var(--transition);
            will-change: transform;
        }
        .vid-card:hover, .vid-card:focus {
            transform: scale(1.04);
            outline-color: var(--accent);
            box-shadow: 0 8px 30px rgba(231,76,60,0.25);
        }
        .vid-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            background-color: #2a2a2a;
        }
        .vid-info { padding: 12px 14px; }
        .vid-title {
            font-size: 1rem; font-weight: 700; line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ===== SKELETON LOADER ===== */
        .skeleton {
            background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: var(--radius);
            height: 190px;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ===== PLAYER OVERLAY ===== */
        #player-overlay {
            position: fixed; inset: 0;
            background: #000;
            z-index: 200;
            display: none;
            flex-direction: column;
        }
        #player-container { flex: 1; width: 100%; }

        #close-btn {
            position: absolute;
            top: 18px; right: 18px;
            background: rgba(231,76,60,0.85);
            color: white; border: none;
            border-radius: 50%;
            width: 52px; height: 52px;
            font-size: 1.4rem;
            cursor: pointer; z-index: 201;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
            transition: background var(--transition), transform var(--transition);
        }
        #close-btn:hover { background: var(--accent); transform: scale(1.1); }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: var(--sub);
            font-size: 1.2rem;
            line-height: 2;
        }
        .empty-state button {
            margin-top: 16px;
            padding: 12px 28px;
            background: var(--accent);
            color: white; border: none;
            border-radius: 10px;
            font-size: 1rem; font-family: inherit;
            cursor: pointer; font-weight: 700;
            transition: opacity var(--transition);
        }
        .empty-state button:hover { opacity: 0.85; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            header { padding: 16px 20px 12px; }
            h1 { font-size: 1.7rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; padding: 0 20px 40px; }
            #status-title { padding: 4px 20px 12px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header>
    <h1><span>▶</span> SmartTube</h1>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <button id="reset-btn" onclick="resetWatched()" title="إعادة تعيين المشاهدة">🔄 إعادة التعيين</button>
        <button id="back-btn" onclick="showChannels()">🔙 القنوات</button>
    </div>
</header>

<div id="status-title">اختر القناة للمشاهدة</div>

<div class="grid" id="channels-grid"></div>
<div class="grid" id="videos-grid" style="display:none;"></div>

<div id="player-overlay">
    <button id="close-btn" onclick="closePlayer()">✕</button>
    <div id="player-container"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
'use strict';

// ================================================================
// 💡 قائمة القنوات — أضف أو احذف هنا بسهولة
// ================================================================
const CHANNELS = [
    { type:'youtube', id:'UCx9R02FLwmLOIr0ViM_M2Bw', name:'عائلة مشيع' },
    { type:'youtube', id:'UCr3XqrfFHRy25Dcrm7RVD0w', name:'عمر وهنا - عربي' },
    { type:'youtube', id:'UCu7WS26vJdvMwHajtXoijSQ', name:'بليبي بالعربي' },
    { type:'youtube', id:'UChOQ_YphUJTEczNXMrUoucg', name:'تام تام' },
    { type:'youtube', id:'UCoxoYSL3rFXB7JSELiI5V1w', name:'فلاد ونيكي عربي' },
    { type:'youtube', id:'UCWIdqSQekeGmUWlSFeCiEnA', name:'أسرتنا' },
    { type:'youtube', id:'UCO_NkEoZ0oJh19HJOVe72Sg', name:'سبيستون' },
    { type:'telegram', id:'Basem4aflamcartoooon',     name:'افلام ديزني بالعربي' },
    { type:'drive',    id:'1DSVCdt0uMhq6HECmJl8EGNJVKz9rYJUP', name:'مكتبة الأفلام 🎬' }
];
const RSS_BASE  = 'https://www.youtube.com/feeds/videos.xml?channel_id=';
const JSON_BASE = 'https://api.rss2json.com/v1/api.json?rss_url=';
const THUMB_URL = id => `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
const WATCHED_KEY = 'st_watched_v2';

// ================================================================
// DOM refs (cached once)
// ================================================================
const $channels  = document.getElementById('channels-grid');
const $videos    = document.getElementById('videos-grid');
const $status    = document.getElementById('status-title');
const $backBtn   = document.getElementById('back-btn');
const $overlay   = document.getElementById('player-overlay');

// ================================================================
// STATE
// ================================================================
let currentVideos = [];
let currentIdx    = -1;
let ytPlayer      = null;

// ================================================================
// WATCHED HELPERS (localStorage)
// ================================================================
const getWatched  = ()       => JSON.parse(localStorage.getItem(WATCHED_KEY) || '[]');
const isWatched   = id       => getWatched().includes(id);
const markWatched = id       => {
    const w = getWatched();
    if (!w.includes(id)) { w.push(id); localStorage.setItem(WATCHED_KEY, JSON.stringify(w)); }
};
function resetWatched() {
    if (confirm('إعادة تعيين قائمة المشاهدة؟\nستعود جميع الفيديوهات للظهور من جديد.')) {
        localStorage.removeItem(WATCHED_KEY);
    }
}

// ================================================================
// FETCH RSS
// ================================================================
async function fetchRSS(channelId) {
    const url = JSON_BASE + encodeURIComponent(RSS_BASE + channelId);
    const res = await fetch(url);
    return res.json();
}

function extractId(item) {
    if (item.guid && item.guid.includes('yt:video:')) return item.guid.split('yt:video:')[1];
    const link = item.link || '';
    if (link.includes('v=')) return link.split('v=')[1].split('&')[0];
    if (link.includes('shorts/')) return link.split('shorts/')[1].split('?')[0];
    return '';
}

// ================================================================
// CHANNEL CARDS — skeleton then fill
// ================================================================
async function renderChannels() {
    $channels.innerHTML = CHANNELS.map(() => `<div class="skeleton"></div>`).join('');
    $channels.style.display = 'grid';
    $videos.style.display   = 'none';
    $backBtn.style.display  = 'none';
    $status.textContent     = 'اختر القناة للمشاهدة';

    // Fetch first video thumb for each YouTube channel in parallel
    const thumbs = await Promise.all(CHANNELS.map(async ch => {
        if (ch.type !== 'youtube') return null;
        try {
            const data = await fetchRSS(ch.id);
            if (data.status === 'ok' && data.items?.length) {
                return THUMB_URL(extractId(data.items[0]));
            }
        } catch(_) {}
        return null;
    }));

    $channels.innerHTML = CHANNELS.map((ch, i) => {
        const thumb = thumbs[i];
        const bgStyle = thumb
            ? `background-image:url('${thumb}');background-size:cover;background-position:center;`
            : ch.type === 'drive'    ? 'background:linear-gradient(135deg,#1a73e8,#0d47a1);'
            : ch.type === 'telegram' ? 'background:linear-gradient(135deg,#0088cc,#005f8f);'
            :                          'background:linear-gradient(135deg,#2c2c2c,#1a1a1a);';

        const action = ch.type === 'telegram' ? `openTelegram('${ch.id}')`
                     : ch.type === 'drive'    ? `openDrive('${ch.id}')`
                     :                          `openChannel('${ch.id}','${ch.name}')`;

        const badgeCls = ch.type === 'telegram' ? 'badge-tg'
                       : ch.type === 'drive'    ? 'badge-gd'
                       :                          'badge-yt';
        const badgeTxt = ch.type === 'telegram' ? 'تيليجرام'
                       : ch.type === 'drive'    ? 'Google Drive'
                       :                          'يوتيوب';

        return `
        <div class="ch-card" tabindex="0" onclick="${action}" onkeydown="keyEnter(event,()=>${action})">
            <div class="bg" style="${bgStyle}"></div>
            <div class="overlay"></div>
            <div class="info">
                <h2>${ch.name}</h2>
                <span class="badge ${badgeCls}">${badgeTxt}</span>
            </div>
        </div>`;
    }).join('');
}

// ================================================================
// OPEN CHANNEL → fetch & filter watched
// ================================================================
async function openChannel(id, name) {
    $channels.style.display = 'none';
    $videos.style.display   = 'grid';
    $backBtn.style.display  = 'inline-block';
    $status.textContent     = `⏳ جاري تحميل ${name}...`;
    $videos.innerHTML       = Array(6).fill(`<div class="skeleton" style="height:220px;"></div>`).join('');

    try {
        const data = await fetchRSS(id);
        if (data.status !== 'ok') throw new Error('bad status');

        const watched = getWatched();
        const all     = data.items.map(item => ({ id: extractId(item), title: item.title }));
        currentVideos = all.filter(v => v.id && !watched.includes(v.id));

        const skipped = all.length - currentVideos.length;
        $status.textContent = `📺 ${name}` + (skipped ? ` • شاهدت ${skipped}` : '');

        if (currentVideos.length === 0) {
            $videos.innerHTML = `
            <div class="empty-state">
                🎉 شاهدت كل الفيديوهات المتاحة من هذه القناة!<br>
                يمكنك إعادة التعيين لمشاهدتها مجدداً.
                <br><button onclick="resetWatched();openChannel('${id}','${name}')">🔄 إعادة التعيين والتحميل</button>
            </div>`;
        } else {
            renderVideos();
        }
    } catch(e) {
        $status.textContent = '⚠️ تعذّر الاتصال. تحقق من الإنترنت.';
        $videos.innerHTML   = '';
    }
}

function renderVideos() {
    $videos.innerHTML = currentVideos.map((v, i) => `
        <div class="vid-card" tabindex="0"
             onclick="openPlayer('${v.id}')"
             onkeydown="keyEnter(event,()=>openPlayer('${v.id}'))">
            <div class="vid-thumb" style="background-image:url('https://img.youtube.com/vi/${v.id}/hqdefault.jpg');"></div>
            <div class="vid-info"><div class="vid-title">${v.title}</div></div>
        </div>`).join('');
}

// ================================================================
// PLAYER
// ================================================================
function openPlayer(videoId) {
    currentIdx = currentVideos.findIndex(v => v.id === videoId);
    markWatched(videoId);
    $overlay.style.display = 'flex';

    if (ytPlayer) {
        ytPlayer.loadVideoById(videoId);
    } else {
        ytPlayer = new YT.Player('player-container', {
            videoId,
            playerVars: { autoplay:1, rel:0, modestbranding:1, fs:1, controls:1, playsinline:1 },
            events: { onStateChange: onPlayerStateChange }
        });
    }
}

function onPlayerStateChange(e) {
    if (e.data === YT.PlayerState.ENDED) playNext();
}

function playNext() {
    const next = currentIdx + 1;
    if (next < currentVideos.length) {
        const v = currentVideos[next];
        markWatched(v.id);
        currentIdx = next;
        ytPlayer.loadVideoById(v.id);
    } else {
        closePlayer();
    }
}

function closePlayer() {
    $overlay.style.display = 'none';
    ytPlayer?.stopVideo();
}

// ================================================================
// EXTERNAL CHANNELS
// ================================================================
const openTelegram = id => window.open(`https://t.me/s/${id}`, '_blank');
const openDrive    = id => window.open(`https://drive.google.com/drive/folders/${id}`, '_blank');

// ================================================================
// NAVIGATION — keyboard & TV remote
// ================================================================
function keyEnter(e, fn) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fn(); } }

document.addEventListener('keydown', e => {
    if (e.key === 'Escape' || e.key === 'Backspace') {
        if ($overlay.style.display === 'flex') { closePlayer(); return; }
        if ($videos.style.display !== 'none') { showChannels(); }
    }
});

function showChannels() {
    $videos.style.display   = 'none';
    $backBtn.style.display  = 'none';
    $channels.style.display = 'grid';
    $status.textContent     = 'اختر القناة للمشاهدة';
}

// ================================================================
// INIT
// ================================================================
renderChannels();
</script>
</body>
</html>
