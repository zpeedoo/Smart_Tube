<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SmartTube - متصفح العائلة الآمن</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* تصميم يحاكي تطبيقات التلفاز (نتفليكس / يوتيوب تي في) */
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --accent-color: #ff0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* منع تحديد النصوص في الشاشات اللمسية */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            /* منع السحب والتمرير المزعج على الآيباد */
            -webkit-overflow-scrolling: touch; 
        }

        header {
            padding: 30px 40px;
            background: linear-gradient(to bottom, rgba(15,15,15,1) 0%, rgba(15,15,15,0) 100%);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 span {
            color: var(--accent-color);
        }

        .channel-title {
            padding: 0 40px;
            font-size: 1.5rem;
            color: #aaaaaa;
            margin-bottom: 20px;
        }

        /* شبكة الفيديوهات (Grid) */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 0 40px 60px 40px;
        }

        .video-card {
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s ease;
            position: relative;
        }

        /* تأثير التكبير عند تمرير الماوس أو الريموت */
        .video-card:hover, .video-card:focus {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
            z-index: 2;
            outline: none; /* إخفاء إطار التركيز الافتراضي */
            border: 3px solid var(--accent-color);
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-size: cover;
            background-position: center;
            background-color: #333; /* لون افتراضي قبل تحميل الصورة */
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.4;
            /* قص النص الطويل (3 أسطر كحد أقصى) */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* مشغل الفيديو المنبثق (Fullscreen Player) */
        #player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        #player-container {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        #close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,0,0,0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            font-weight: bold;
        }

        #close-btn:hover {
            background: red;
            transform: scale(1.1);
        }

        /* لضمان تناسب الشاشات المختلفة */
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                padding: 0 20px 40px 20px;
            }
            header {
                padding: 20px;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1><span>▶</span> SmartTube</h1>
    </header>

    <div class="channel-title">جاري الاتصال بالقناة...</div>

    <!-- شبكة الفيديوهات -->
    <div class="video-grid" id="grid">
        <!-- سيتم توليد الكروت من الجافاسكريبت -->
    </div>

    <!-- شاشة تشغيل الفيديو -->
    <div id="player-overlay">
        <button id="close-btn" onclick="closePlayer()">✕</button>
        <div id="player-container"></div>
    </div>

    <!-- استدعاء مكتبة يوتيوب الرسمية للمشغل المدمج (IFrame Player API) -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // 1. الداتا الديناميكية (سحب أحدث فيديوهات القناة تلقائياً)
        
        // 💡💡 المكان المخصص لتغيير القناة 💡💡
        // ضع (آيدي) القناة التي تريدها هنا. 
        // القناة الحالية: عائلة مشيع (OurFamilyLifeJO)
        const channelId = 'UCx9R02FLwmLOIr0ViM_M2Bw'; 
        
        const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
        let cleanVideos = [];

        async function fetchChannelVideos() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                if (data.status === 'ok') {
                    // تصفية الفيديوهات لاستبعاد (الشورتس Shorts) وإبقاء الفيديوهات الطويلة فقط
                    const longVideosOnly = data.items.filter(item => {
                        const linkStr = item.link || "";
                        return !linkStr.includes('shorts/');
                    });

                    cleanVideos = longVideosOnly.map(item => {
                        // الآيدي موجود في guid بصيغة yt:video:ID
                        let videoId = "";
                        if (item.guid && item.guid.includes('yt:video:')) {
                            videoId = item.guid.split('yt:video:')[1];
                        } else {
                            const linkStr = item.link || "";
                            if (linkStr.includes('v=')) videoId = linkStr.split('v=')[1];
                            const amp = videoId.indexOf('&');
                            if (amp !== -1) videoId = videoId.substring(0, amp);
                        }
                        
                        return { id: videoId, title: item.title };
                    });
                    
                    const titleEl = document.querySelector('.channel-title');
                    if(titleEl && data.feed && data.feed.title) {
                        titleEl.innerText = `أحدث الفيديوهات من قناة: ${data.feed.title}`;
                    }
                    renderVideos();
                }
            } catch (error) {
                console.error('Error fetching videos:', error);
            }
        }
        const grid = document.getElementById('grid');
        let player = null;

        fetchChannelVideos();

        // 2. دالة لإنشاء كروت الفيديوهات في الشاشة
        function renderVideos() {
            let html = '';
            cleanVideos.forEach((video, index) => {
                // جلب صورة المصغرة بأعلى جودة من سيرفرات يوتيوب مباشرة
                const thumbUrl = `https://img.youtube.com/vi/${video.id}/hqdefault.jpg`;
                
                // يتم إضافة tabindex="0" لجعل الكرت قابل للتحديد بالريموت كنترول (Smart TV)
                html += `
                    <div class="video-card" tabindex="0" onclick="openPlayer('${video.id}')" onkeypress="handleKeyPress(event, '${video.id}')">
                        <div class="thumbnail" style="background-image: url('${thumbUrl}');"></div>
                        <div class="video-info">
                            <div class="video-title">${video.title}</div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // 3. دعم الريموت كنترول (TV) والكيبورد للضغط على "Enter"
        function handleKeyPress(event, videoId) {
            if (event.key === 'Enter') {
                openPlayer(videoId);
            }
        }

        // 4. تشغيل الفيديو في المشغل المغلق والمقيد
        function openPlayer(videoId) {
            const overlay = document.getElementById('player-overlay');
            overlay.style.display = 'flex';

            // إذا كان المشغل موجوداً مسبقاً، نقوم بتغيير الفيديو فقط
            if (player) {
                player.loadVideoById(videoId);
            } else {
                // إنشاء مشغل يوتيوب النظيف
                player = new YT.Player('player-container', {
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1,      // تشغيل تلقائي
                        'rel': 0,           // الأهم!: عدم إظهار فيديوهات مقترحة من قنوات أخرى في النهاية
                        'modestbranding': 1, // إخفاء لوجو يوتيوب قدر الإمكان
                        'fs': 1,            // زر ملء الشاشة
                        'controls': 1       // إظهار شريط التحكم
                    },
                    events: {
                        // عند انتهاء الفيديو، يمكننا برمجته ليغلق الشاشة تلقائياً 
                        'onStateChange': function(event) {
                            if (event.data === YT.PlayerState.ENDED) {
                                closePlayer();
                            }
                        }
                    }
                });
            }
        }

        // 5. إغلاق المشغل
        function closePlayer() {
            const overlay = document.getElementById('player-overlay');
            overlay.style.display = 'none';
            if (player) {
                player.stopVideo(); // إيقاف الفيديو عند الإغلاق
            }
        }

        // بدء الرسم فور تحميل الصفحة
        renderVideos();

    </script>
</body>
</html>
